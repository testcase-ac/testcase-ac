name: Merge testcase contribution

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: merge-testcase-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.issue.pull_request && github.event.comment.body == '/merge-testcase'
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.TESTCASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.TESTCASE_BOT_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Validate testcase contribution and merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.issue.number;
            const commenter = context.payload.comment.user.login;

            async function comment(body) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
            }

            async function reject(message) {
              await comment(`Cannot merge with \`/merge-testcase\`: ${message}`);
              core.setFailed(message);
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });
            const { data: repository } = await github.rest.repos.get({ owner, repo });

            if (pr.state !== 'open') {
              return reject('the pull request is not open.');
            }
            if (pr.draft) {
              return reject('the pull request is still a draft.');
            }
            core.info('OK: pull request is open and not a draft.');

            if (pr.base.ref !== repository.default_branch) {
              return reject(`this command only merges pull requests targeting \`${repository.default_branch}\`.`);
            }
            core.info(`OK: pull request targets default branch ${repository.default_branch}.`);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            if (files.length === 0) {
              return reject('the pull request has no changed files.');
            }
            core.info(`OK: pull request changes ${files.length} file(s).`);

            const underTestcase = (path) => path.startsWith('testcase/');
            const problemDir = (path) => {
              const match = path.match(/^(testcase\/[^/]+\/[^/]+)\//);
              return match ? match[1] : null;
            };

            const changedProblemDirs = new Set();
            const outsideTestcase = [];
            const outsideProblemDirs = [];

            for (const file of files) {
              const paths = [file.filename];
              if (file.previous_filename) paths.push(file.previous_filename);

              for (const path of paths) {
                if (!underTestcase(path)) {
                  outsideTestcase.push(path);
                  continue;
                }

                const dir = problemDir(path);
                if (!dir) {
                  outsideProblemDirs.push(path);
                  continue;
                }
                changedProblemDirs.add(dir);
              }
            }

            if (outsideTestcase.length > 0) {
              return reject(`all changed files must be under \`testcase/\`. Offending path: \`${outsideTestcase[0]}\`.`);
            }
            core.info('OK: all changed files are under testcase/.');

            if (outsideProblemDirs.length > 0) {
              return reject(`changes must be inside problem directories like \`testcase/boj/1000/\`. Offending path: \`${outsideProblemDirs[0]}\`.`);
            }
            core.info('OK: all changed files are inside testcase problem directories.');

            if (changedProblemDirs.size === 0) {
              return reject('no changed testcase problem directories were found.');
            }
            core.info(`OK: found ${changedProblemDirs.size} changed testcase problem directory/directories.`);

            for (const dir of [...changedProblemDirs].sort()) {
              const validatorPath = `${dir}/validator.cpp`;
              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: validatorPath,
                  ref: pr.head.sha,
                });
                if (Array.isArray(response.data) || response.data.type !== 'file') {
                  return reject(`\`${validatorPath}\` must be a file.`);
                }
              } catch (error) {
                if (error.status === 404) {
                  return reject(`\`${validatorPath}\` is required for every changed testcase problem directory.`);
                }
                throw error;
              }
            }
            core.info('OK: every changed testcase problem directory has validator.cpp.');

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'verify-problems.yml',
              event: 'pull_request',
              head_sha: pr.head.sha,
              per_page: 100,
            });

            const verifyRun = runs
              .filter((run) => run.head_sha === pr.head.sha)
              .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at))[0];

            if (!verifyRun) {
              return reject('the `Verify contributed problems` workflow has not run for the current PR commit.');
            }
            if (verifyRun.status !== 'completed') {
              return reject(`the \`Verify contributed problems\` workflow is still \`${verifyRun.status}\`.`);
            }
            if (verifyRun.conclusion !== 'success') {
              return reject(`the \`Verify contributed problems\` workflow concluded with \`${verifyRun.conclusion}\`.`);
            }
            core.info(`OK: Verify contributed problems passed for ${pr.head.sha}.`);

            if (!repository.allow_squash_merge) {
              return reject('squash merge is not enabled for this repository.');
            }
            core.info('OK: squash merge is enabled for this repository.');

            let permission = 'none';
            try {
              const response = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: commenter,
              });
              permission = response.data.permission;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const isMaintainer = ['admin', 'maintain', 'write'].includes(permission);
            if (!isMaintainer) {
              if (commenter !== pr.user.login) {
                return reject('non-maintainers can only request testcase self-merge on their own pull requests.');
              }
              core.info('OK: non-maintainer commenter is the pull request author.');

              const previousMerged = await github.rest.search.issuesAndPullRequests({
                q: [
                  `repo:${owner}/${repo}`,
                  'is:pr',
                  'is:merged',
                  `author:${pr.user.login}`,
                ].join(' '),
                per_page: 1,
              });
              const authorHasPreviousMerge = previousMerged.data.total_count >= 1;

              if (!authorHasPreviousMerge) {
                return reject('PR authors need at least one previously merged PR in this repository to self-merge testcase changes.');
              }
              core.info('OK: pull request author has at least one previously merged PR in this repository.');
            } else {
              core.info(`OK: ${commenter} has ${permission} access.`);
            }

            const mergeRequest = {
              owner,
              repo,
              pull_number,
              sha: pr.head.sha,
              merge_method: 'squash',
              commit_title: pr.title,
              commit_message: `#${pull_number}`,
            };

            const { data: merge } = await github.rest.pulls.merge(mergeRequest);
            await comment(`Squash-merged with \`/merge-testcase\`: ${merge.sha}`);
