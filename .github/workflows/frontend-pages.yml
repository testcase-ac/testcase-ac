name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/contracts/**"
      - "testcase/boj/**"
      - ".github/workflows/frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: frontend-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /
          VITE_API_BASE_URL: https://api.testcase.ac
          VITE_GITHUB_REPO_URL: https://github.com/testcase-ac/testcase-ac
          VITE_GITHUB_REPO_BRANCH: main
        run: npm run build

      - name: Add extension compatibility data
        run: python3 scripts/write_extension_problems.py

      - name: Add custom domain
        run: echo "testcase.ac" > dist/CNAME

      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
