name: Verify contributed problems

on:
  pull_request:
    paths:
      - "backend/cmd/verify/**"
      - "backend/internal/**"
      - "deploy/stresser.Dockerfile"
      - "testcase/**"
      - "tests/dockertest/**"
      - "tests/verify/**"
      - ".github/workflows/verify-problems.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find changed problems
        id: changed-problems
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="HEAD^"
          fi
          echo "Diff base: ${base}"
          mapfile -t problem_dirs < <(./tests/verify/changed_problem_dirs.sh "${base}" HEAD)
          if [ "${#problem_dirs[@]}" -eq 0 ]; then
            echo "No changed problem directories detected; verifying smoke fixture."
            problem_dirs=(testcase/boj/1000)
          fi
          printf 'Problem directories selected for verification:\n'
          printf '  %s\n' "${problem_dirs[@]}"
          {
            echo "problem-dirs<<EOF"
            printf '%s\n' "${problem_dirs[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          context: .
          file: deploy/stresser.Dockerfile
          tags: testcase-ac-dockertest:latest
          load: true
          cache-from: type=gha,scope=stresser-runtime
          cache-to: type=gha,mode=max,scope=stresser-runtime

      - name: Verify changed problems
        env:
          DOCKERTEST_SKIP_BUILD: "1"
          PROBLEM_DIRS: ${{ steps.changed-problems.outputs.problem-dirs }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t problem_dirs <<< "${PROBLEM_DIRS}"
          status=0
          VERIFY_REPORT_JSON=verify-report.json ./tests/verify/run_problems.sh "${problem_dirs[@]}" || status=$?
          node ./tests/verify/write_summary.mjs verify-report.json
          exit "${status}"
