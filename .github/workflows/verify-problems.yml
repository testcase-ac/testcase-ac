name: Verify contributed problems

on:
  pull_request:
    paths:
      - "backend/cmd/changed-problems/**"
      - "backend/cmd/verify/**"
      - "backend/internal/**"
      - "deploy/stresser.Dockerfile"
      - "testcase/**"
      - "tests/dockertest/**"
      - "tests/verify/**"
      - ".github/workflows/verify-problems.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Find changed problems
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="HEAD^"
          fi
          echo "Diff base: ${base}"
          go -C backend run ./cmd/changed-problems \
            --repo-root "${GITHUB_WORKSPACE}" \
            --base "${base}" \
            > changed-problems.json
          echo "Affected problem directories:"
          jq -r '.affectedProblemDirs[] | "  \(.)"' changed-problems.json
          echo "Unowned testcase paths:"
          jq -r '.unownedTestcasePaths[] | "  \(.)"' changed-problems.json
          if [ "$(jq '.unownedTestcasePaths | length' changed-problems.json)" -ne 0 ]; then
            echo "Every changed testcase path must belong directly to a supported problem directory." >&2
            exit 1
          fi

      - name: Build runtime image
        run: docker build -f deploy/stresser.Dockerfile -t testcase-ac-dockertest .

      - name: Verify changed problems
        env:
          DOCKERTEST_SKIP_BUILD: "1"
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t problem_dirs < <(jq -r '.affectedProblemDirs[]' changed-problems.json)
          if [ "${#problem_dirs[@]}" -eq 0 ]; then
            echo "No affected problem directories detected; verifying smoke fixture."
            problem_dirs=(testcase/boj/1000)
          fi
          printf 'Problem directories selected for verification:\n'
          printf '  %s\n' "${problem_dirs[@]}"
          status=0
          VERIFY_REPORT_JSON=verify-report.json ./tests/verify/run_problems.sh "${problem_dirs[@]}" || status=$?
          node ./tests/verify/write_summary.mjs verify-report.json
          exit "${status}"
