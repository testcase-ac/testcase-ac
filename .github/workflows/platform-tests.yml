name: Platform tests

on:
  pull_request:
    paths:
      - "backend/**"
      - "deploy/stresser.Dockerfile"
      - "dev.sh"
      - "frontend/**"
      - "tests/**"
      - ".github/workflows/platform-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: |
          npm run typecheck
          npm test

      - name: Test host-safe backend packages
        working-directory: backend
        run: go test ./api ./contracts ./internal/executor ./internal/loader ./cmd/verify

      - name: Build runtime image
        run: docker build -f deploy/stresser.Dockerfile -t testcase-ac-dockertest .

      - name: Test runtime backend packages
        env:
          DOCKERTEST_SKIP_BUILD: "1"
        run: ./tests/dockertest/run_test.sh ./stresser ./internal/verify

      - name: Run E2E smoke test
        env:
          STRESSER_IMAGE: testcase-ac-dockertest
        run: ./tests/e2e/run_smoke.sh
