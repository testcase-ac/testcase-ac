name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/api.sh"
      - "deploy/build-author-index.go"
      - "testcase/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testcase-ac-prod
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Test API packages
        working-directory: backend
        run: go test ./api ./contracts ./internal/loader

      # Exchange GitHub's OIDC token for short-lived credentials scoped to the API deployer role.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.API_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-api-${{ github.run_id }}
          aws-region: ${{ vars.API_AWS_REGION }}

      - name: Configure temporary Lightsail SSH access
        env:
          LIGHTSAIL_INSTANCE_NAME: ${{ vars.API_LIGHTSAIL_INSTANCE_NAME }}
          AWS_REGION: ${{ vars.API_AWS_REGION }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Use the AWS session to request a temporary SSH identity and authenticated server host keys.
          access_details="$(aws lightsail get-instance-access-details \
            --region "${AWS_REGION}" \
            --instance-name "${LIGHTSAIL_INSTANCE_NAME}" \
            --protocol ssh \
            --output json)"
          deploy_host="$(jq -er '.accessDetails.ipAddress' <<<"${access_details}")"
          deploy_user="$(jq -er '.accessDetails.username' <<<"${access_details}")"

          jq -er '.accessDetails.privateKey' <<<"${access_details}" > ~/.ssh/lightsail_deploy
          jq -er '.accessDetails.certKey' <<<"${access_details}" > ~/.ssh/lightsail_deploy-cert.pub
          jq -er --arg host "${deploy_host}" \
            '.accessDetails.hostKeys[] | [$host, .algorithm, .publicKey] | @tsv' \
            <<<"${access_details}" > ~/.ssh/known_hosts

          chmod 600 ~/.ssh/lightsail_deploy ~/.ssh/lightsail_deploy-cert.pub
          chmod 644 ~/.ssh/known_hosts
          ssh-keygen -L -f ~/.ssh/lightsail_deploy-cert.pub >/dev/null

          cat >> ~/.ssh/config <<EOF
          Host testcase-ac-api-deploy
            HostName ${deploy_host}
            User ${deploy_user}
            IdentityFile ~/.ssh/lightsail_deploy
            CertificateFile ~/.ssh/lightsail_deploy-cert.pub
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

          # Tell api.sh to connect through the temporary Lightsail SSH alias configured above.
          echo "DEPLOY_HOST=testcase-ac-api-deploy" >> "${GITHUB_ENV}"

      - name: Deploy API
        env:
          STRESSER_LAMBDA_FUNCTION_NAME: ${{ vars.STRESSER_LAMBDA_FUNCTION_NAME }}
          DEPLOY_AWS_REGION: ${{ vars.API_AWS_REGION }}
        run: ./deploy/api.sh

      - name: Remove temporary SSH credentials
        if: always()
        run: rm -f ~/.ssh/lightsail_deploy ~/.ssh/lightsail_deploy-cert.pub
